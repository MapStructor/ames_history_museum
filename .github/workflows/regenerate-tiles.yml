name: Regenerate PMTiles

on:
  schedule:
    - cron: '0 3 * * *'  # nightly at 3am UTC
  workflow_dispatch:       # manual trigger from GitHub Actions UI
  push:
    paths: ['deploy/trigger.md']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install Tippecanoe
        run: sudo apt-get install -y tippecanoe

      - name: Export GeoJSON from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - <<'EOF'
          import json, urllib.request, urllib.error

          url_base = f"{__import__('os').environ['SUPABASE_URL']}/rest/v1/ames_buildings_2026?select=*&status=in.(permanent,editing)"
          key = __import__('os').environ['SUPABASE_SERVICE_KEY']
          headers = {"apikey": key, "Authorization": f"Bearer {key}"}

          all_rows = []
          page_size = 1000
          offset = 0

          while True:
              url = f"{url_base}&limit={page_size}&offset={offset}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  batch = json.loads(r.read())
              all_rows.extend(batch)
              print(f"Fetched {len(all_rows)} rows so far...")
              if len(batch) < page_size:
                  break
              offset += page_size

          features = []
          for row in all_rows:
              geom = row.get('geom')
              if not geom:
                  continue
              props = {k: v for k, v in row.items() if k != 'geom'}
              features.append({"type": "Feature", "geometry": geom, "properties": props})

          geojson = {"type": "FeatureCollection", "features": features}
          with open('buildings.geojson', 'w') as f:
              json.dump(geojson, f)

          print(f"Exported {len(features)} features total")
          EOF

      - name: Generate PMTiles
        run: |
          tippecanoe \
            -o buildings.pmtiles \
            -l buildings \
            --use-attribute-for-id=id \
            --drop-densest-as-needed \
            --maximum-zoom=16 \
            --minimum-zoom=10 \
            buildings.geojson

      - name: Reset editing status to permanent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - <<'EOF'
          import urllib.request, os, json
          url = os.environ['SUPABASE_URL'] + '/rest/v1/ames_buildings_2026?status=eq.editing'
          key = os.environ['SUPABASE_SERVICE_KEY']
          data = json.dumps({'status': 'permanent'}).encode()
          req = urllib.request.Request(url, data=data, method='PATCH', headers={
            'apikey': key, 'Authorization': 'Bearer ' + key,
            'Content-Type': 'application/json', 'Prefer': 'return=minimal'
          })
          urllib.request.urlopen(req)
          print('Reset editing → permanent')
          EOF

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp buildings.pmtiles s3://$R2_BUCKET/buildings.pmtiles \
            --endpoint-url $R2_ENDPOINT
