<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHM Testing — Supabase Layer Loader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }

    #map { flex: 1; height: 100vh; }

    #sidebar {
      width: 320px;
      height: 100vh;
      overflow-y: auto;
      background: #fff;
      box-shadow: -2px 0 8px rgba(0,0,0,0.15);
      display: none;
      flex-direction: column;
    }
    #sidebar.open { display: flex; }

    #panel-content {
      padding: 16px;
      font-family: sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    #panel-content img { max-width: 100%; height: auto; }
    #panel-close {
      padding: 10px 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
      font-size: 13px;
      color: #555;
    }
    #panel-close:hover { background: #eee; }

    #status {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
  <div id="panel-close">✕ Close</div>
  <div id="panel-content">Click a feature to load content.</div>
</div>

<div id="status">Loading layers from Supabase...</div>

<!-- Mapbox token — mapbox-token.js takes priority (gitignored, dev only) -->
<script src="js/mapbox-token.js"></script>
<script src="js/lists/restrictedToken.js"></script>

<script>
  // Supabase client
  const SUPABASE_URL = 'https://padavlcmwidjnhxzkhyb.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBhZGF2bGNtd2lkam5oeHpraHliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzMzODEsImV4cCI6MjA5MjM0OTM4MX0.me5DqJgtSHBHKnZowf2AFIWqof-oydvly40Aeo6wC9o'
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  // Map init
  mapboxgl.accessToken = (typeof mapboxToken !== 'undefined') ? mapboxToken : restrictedToken
  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/nittyjee/cjg705tp9c5xw2rlhsukbq0bs',
    center: [-93.63661, 42.03112],
    zoom: 13.63
  })
  map.addControl(new mapboxgl.NavigationControl(), 'bottom-right')

  // Sidebar
  const sidebar  = document.getElementById('sidebar')
  const panelEl  = document.getElementById('panel-content')
  document.getElementById('panel-close').addEventListener('click', () => {
    sidebar.classList.remove('open')
  })

  // Fix absolute URL paths from Drupal relative links/images
  function processEncyclopediaHtml(html, base) {
    const origin = base.replace(/^(https?:\/\/[^\/]+).*/, '$1')
    return html
      .replace(/(<a\s+href=")([^"]+)(")/g, (_, p1, p2, p3) =>
        p2.startsWith('http') ? p1+p2+p3 : p1+origin+p2+p3)
      .replace(/(<a\s+[^>]*)(>)/g, (_, p1, p2) => p1+' target="_blank"'+p2)
      .replace(/(<img.*src=")([^"]+)(")/g, (_, p1, p2, p3) =>
        p2.startsWith('http') ? p1+p2+p3 : p1+origin+p2+p3)
  }

  // Fetch from Drupal encyclopedia and render into sidebar
  async function fetchAndRender(layer, props) {
    const nid = props[layer.nid_prop || 'nid']
    sidebar.classList.add('open')
    panelEl.innerHTML = '<p>Loading...</p>'

    if (!layer.content_base_url || !nid) {
      panelEl.innerHTML = '<p>No content linked.</p>'
      return
    }

    try {
      const res  = await fetch(layer.content_base_url + '/rendered-export-single?nid=' + nid)
      const data = await res.json()
      const html = processEncyclopediaHtml(data[0].rendered_entity, layer.content_base_url)
      panelEl.innerHTML = html
    } catch (e) {
      panelEl.innerHTML = '<p>Error loading content: ' + e.message + '</p>'
      console.error(e)
    }
  }

  // Add a layer row from Supabase to the map and wire up click
  function addSupabaseLayer(map, row) {
    const sourceId = row.id + '-source'

    if (!map.getSource(sourceId)) {
      map.addSource(sourceId, {
        type: row.source_type,
        url: row.source_url
      })
    }

    const layerSpec = {
      id: row.id,
      type: row.type,
      source: sourceId,
      paint: row.paint || {},
      layout: row.layout || { visibility: 'visible' }
    }
    if (row.source_layer) layerSpec['source-layer'] = row.source_layer
    if (row.raw_style)    Object.assign(layerSpec, row.raw_style)

    map.addLayer(layerSpec)

    // Hover cursor
    map.on('mousemove', row.id, () => map.getCanvas().style.cursor = 'pointer')
    map.on('mouseleave', row.id, () => map.getCanvas().style.cursor = '')

    // Click → info panel
    if (row.click) {
      map.on('click', row.id, (e) => {
        const props = e.features[0].properties
        fetchAndRender(row, props)
      })
    }
  }

  // Load layers from Supabase on map ready
  map.on('load', async () => {
    const { data: layers, error } = await db.from('layers').select('*')

    if (error) {
      document.getElementById('status').textContent = 'Error: ' + error.message
      console.error(error)
      return
    }

    if (!layers || layers.length === 0) {
      document.getElementById('status').textContent = 'No layers found in Supabase yet.'
      return
    }

    layers.forEach(row => {
      try { addSupabaseLayer(map, row) }
      catch (e) { console.warn('Failed to add layer ' + row.id + ':', e) }
    })

    document.getElementById('status').textContent = `Loaded ${layers.length} layer(s) from Supabase`
  })
</script>

</body>
</html>
